<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect for BrowserRouter
      // When GitHub Pages serves a 404 for /about, /skills etc.,
      // this redirects to /?p=/about so the SPA can restore the route.
      (function () {
        var l = window.location;
        var path = l.pathname + l.search + l.hash;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          '/?p=' + encodeURIComponent(path)
        );
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
  </body>
</html>
